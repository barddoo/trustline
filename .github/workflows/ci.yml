name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Build CLI binary
        run: bun run build:cli:host

      - name: Smoke test CLI binary
        run: |
          DB_PATH="$(mktemp -u /tmp/trustline-cli-XXXX.sqlite)"
          ./packages/trustline-cli/dist/cli/trustline-cli client create \
            --issuer https://auth.internal \
            --sqlite-path "$DB_PATH" \
            --name ci-smoke \
            --scope read:inventory > /tmp/trustline-cli-create.out
          ./packages/trustline-cli/dist/cli/trustline-cli client list \
            --issuer https://auth.internal \
            --sqlite-path "$DB_PATH" > /tmp/trustline-cli-list.out
          grep "TRUSTLINE_CLIENT_ID" /tmp/trustline-cli-create.out
          grep "ci-smoke" /tmp/trustline-cli-list.out

      - name: Test
        run: bun run test

      - name: Typecheck
        run: bun run typecheck
